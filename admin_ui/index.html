<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADMIN DASHBOARD</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>PLASTIC RRR ADMIN</h1>
        <a href="./history.html">View History</a>
      </header>
      <main>
        <div class="main-container">
          <h1>Admin Dashboard</h1>
          <div class="total-info">
            <div class="info-card">
              <i class="fa-solid fa-layer-group"></i>
              <small>Total Submissions</small>
              <p>10</p>
            </div>
            <div class="info-card">
              <i class="fa-solid fa-circle-check"></i>
              <small>Total Approved</small>
              <p>8</p>
            </div>
            <div class="info-card">
              <i class="fa-solid fa-circle-xmark"></i>
              <small>Total Rejected</small>
              <p>2</p>
            </div>
            <div class="info-card">
              <i class="fa-solid fa-clipboard-check"></i>
              <small>Total Plastic Collected (kg)</small>
              <p>50 kg</p>
            </div>
          </div>
          <div class="pending-submissions">
            <h2>Pending Submissions</h2>
            <div class="pending">
              
            </div>
          </div>
        </div>
      </main>
      <footer>&copy; PLASTIC RRR 2026. All Rights Reserved</footer>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
