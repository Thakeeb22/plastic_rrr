<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>HISTORY</h1>
        <a href="./index.html">View Pending</a>
      </header>
      <main>
        <div class="main-container">
          <h1>History Dashboard</h1>
          <div class="total-info">
            <div class="info-card">
              <i class="fa-solid fa-layer-group"></i>
              <small>Total Submissions</small>
              <p>10</p>
            </div>
            <div class="info-card">
              <i class="fa-solid fa-circle-check"></i>
              <small>Total Approved</small>
              <p>8</p>
            </div>
            <div class="info-card">
              <i class="fa-solid fa-circle-xmark"></i>
              <small>Total Rejected</small>
              <p>2</p>
            </div>
            <div class="info-card">
              <i class="fa-solid fa-clipboard-check"></i>
              <small>Total Plastic Collected (kg)</small>
              <p>50 kg</p>
            </div>
          </div>
          <div class="history-table">
            <h2>HISTORY</h2>
            <div class="table-container">
              <table>
                <tr>
                  <th>Profile Code</th>
                  <th>Contact</th>
                  <th>Weight(KG)</th>
                  <th>Time Stamp</th>
                  <th>Status</th>
                </tr>
              </table> 
            </div>
          </div>
        </div>
      </main>
      <footer>&copy; PLASTIC RRR 2026. All Rights Reserved</footer>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
