<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <title>Plastic RRR Store</title>
  </head>
  <body>
    <div class="main-container">
      <header>
        <div class="head">
          <h1>Plastic RRR Store</h1>
          <span class="pts"
            ><p>Your Available Points:</p>
            <p id="userPoints">0 pts</p></span
          >
          <div class="cart-logout">
            <div class="cart-icon-box">
              <i class="fa-solid fa-cart-arrow-down cart-btn"></i>
              <span id="cartCount">0</span>
            </div>
            <button class="logout-btn">logout</button>
          </div>
        </div>
        <div class="hero">
          <h1 id="welcomeUser"></h1>
          <p>
            You have saved 42kg of plastic on the internet. Redeem your hard
            earned points with some of the products below
          </p>
        </div>
      </header>
      <main>
        <div class="products">
          <h1>Available Products you can redeem</h1>
          <div class="product-container" id="productContainer"></div>
        </div>
      </main>
      <footer>&copy; All Rights Reserved. Plastic RRR</footer>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
